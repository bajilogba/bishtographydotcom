      <h2>Contact Bishtography</h2>
      <p class="info-needed">Required information is marked with an asterisk (*).</p>

      <form action="mailto:bishtography@mail.com" method="post" enctype="text/plain">

        <label for="fname">* First Name:</label>
        <input type="text" id="fname" name="First_Name" required>

        <label for="lname">* Last Name:</label>
        <input type="text" id="lname" name="Last_Name" required>

        <label for="address">* Address:</label>
        <input type="text" id="address" name="Address" required>

        <label for="city">* City:</label>
        <input type="text" id="city" name="City" required>

        <label for="state">* State:</label>
        <input type="text" id="state" name="State" required>

        <label for="zip">* ZIP Code:</label>
        <input type="text" id="zip" name="ZIP" required>

        <label for="email">* Email:</label>
        <input type="email" id="email" name="Email" required>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="Phone">

        <p>Preferred Contact Method:</p>
        <label class="radio-label">
          <input type="radio" name="Contact_Method" value="Email" checked> Email
        </label>
        <label class="radio-label">
          <input type="radio" name="Contact_Method" value="Phone"> Phone
        </label>
        <label class="radio-label">
          <input type="radio" name="Contact_Method" value="Mail"> Mail
        </label>
        <label class="radio-label">
          <input type="radio" name="Contact_Method" value="Text"> Text Message
        </label>

        <label for="reason">Reason for Contact:</label>
        <select id="reason" name="Reason">
          <option value="Reservation">Reservation Question</option>
          <option value="General">General Inquiry</option>
          <option value="Feedback">Feedback</option>
          <option value="Other">Other</option>
        </select>

        <label for="contactDate">Preferred Contact Date:</label>
        <input type="date" id="contactDate" name="Contact_Date">

        <label for="fileUpload">Upload File:</label>
        <input type="file" id="fileUpload" name="File">

        <label for="comments">* Comments:</label>
        <textarea id="comments" name="Comments" rows="8" required></textarea>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

      </form>
