      <main>
  <h2>Customer Feedback</h2>
  <p class="info-needed">We value your opinion. Please share your experience with us.</p>

  <form action="mailto:bishtography@mail.com" method="post" enctype="text/plain">
    
    <div class="form-group">
      <label for="myName">* Name:</label>
      <input type="text" id="myName" name="myName" required>

      <label for="myEmail">* Email:</label>
      <input type="email" id="myEmail" name="myEmail" required>
    </div>

    <div class="form-group">
      <label for="visit">Date of Visit:</label>
      <input type="date" id="visit" name="visit">

      <label for="rating">Rating:</label>
      <select id="rating" name="rating">
        <option value="5">Excellent</option>
        <option value="4">Good</option>
        <option value="3">Average</option>
        <option value="2">Poor</option>
        <option value="1">Very Poor</option>
      </select>
    </div>

    <label for="comments">Comments:</label>
    <textarea id="comments" name="comments" rows="6" required></textarea>

    <input type="submit" value="Submit Feedback">
    <input type="reset" value="Reset">
  </form>

  
</main>
